# indexer.cfg
# Configuration for the unified index builder (build_indexes.py).
# Shared by build_indexes.py via cfg_loader.py.
# Lines beginning with # are comments. Inline # comments are supported on pattern lines.


[paths]
root_directory = D:\claude\filesystem\

# index_directory: where directory_index.md, directory_index_with_files.md are written.
# search_index.db always lives in Python/ alongside the MCP server that uses it.
# Absolute path:       D:\claude\filesystem\index
# Root-relative path:  /index/  (resolves to root_directory\index\)
# Blank:               defaults to root_directory (current behaviour)
index_directory =


[directory_index]
# Controls which directories appear in directory_index.md and directory_index_with_files.md.
# mode = blacklist  ->  all directories included except those listed below
# mode = whitelist  ->  only directories listed below are included
mode = blacklist

# Pattern syntax:
#   dirname/      exclude this directory and all contents (won't appear in any output)
#   dirname/*.*   directory appears in the tree but its files are not listed or indexed
#                 (use this when you need to navigate TO a directory but don't care what's inside)

.git/
.obsidian/
.vscode/
.github/
__pycache__/
node_modules/
Trash/*.*       # visible in directory tree for navigation, but contents not listed or indexed


[search_index]
# Directories excluded from search_index.db, in addition to directory_index exclusions.
# These directories still appear in the directory tree; their files are just not indexed.
# Always blacklist — search exclusions are additive on top of directory_index exclusions.

Python/
Perchance_prompts/
Sheet_Import/
Miscelanious_rpg_material/


[file_types]
# Controls which file extensions are eligible for search indexing.
# mode = whitelist  ->  only listed extensions are indexed
# mode = blacklist  ->  all extensions indexed except those listed
mode = whitelist

*.md
*.txt
*.svg
*.jpg


[context_limits]
# How many lines of each file the search indexer reads for content.
#  -1      entire file (default)
#   0      filename and path only, no content stored
#           use for binary or image types where content is not meaningful
#   N      first N lines only
#  line_N  read line N of the file, extract the first integer found there,
#           use that integer as the line limit for this file.
#           useful for files that declare their own indexable depth in a header.

default = -1
*.jpg = 0
*.svg = 4
*.aimap.svg = line_8
