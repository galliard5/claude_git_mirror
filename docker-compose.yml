# docker-compose.yml — MCP server stack
#
# Starts three MCP servers, all exposing Streamable HTTP transport
# so Claude Desktop connects via URL rather than spawning subprocesses.
#
# Host paths are set in .env (gitignored) — edit that file for your machine.
# Container paths (/corpus, /memory) are fixed and referenced by the servers.
#
# Usage:
#   docker compose up -d          # start all servers in background
#   docker compose down           # stop all servers
#   docker compose logs -f        # tail logs from all servers
#   docker compose build          # rebuild Python image after code changes

services:

  # -------------------------------------------------------------------------
  # corpus-search — FTS5 full-text search over the worldbuilding corpus
  # Read-only mount: this server never writes to the corpus.
  # -------------------------------------------------------------------------
  corpus-search:
    build:
      context: ./Python
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ${CORPUS_HOST_PATH}:/corpus:ro
    environment:
      CORPUS_ROOT: /corpus
      MCP_PORT: "8001"
    command: python search_mcp_server.py
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # index-tools — rebuilds directory indexes and search_index.db
  # Read-write mount: this server writes the generated index files.
  # -------------------------------------------------------------------------
  index-tools:
    build:
      context: ./Python
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ${CORPUS_HOST_PATH}:/corpus
    environment:
      CORPUS_ROOT: /corpus
      MCP_PORT: "8002"
    command: python index_tools_mcp_server.py
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # memory — official MCP memory server, wrapped by supergateway
  # MEMORY_FILE_PATH points at the bind-mounted memory.jsonl on the host.
  # --pass-environment forwards MEMORY_FILE_PATH into the npx subprocess.
  # -------------------------------------------------------------------------
  memory:
    image: supercorp/supergateway
    ports:
      - "8004:8000"
    volumes:
      - ${MEMORY_HOST_PATH}:/memory
    environment:
      MEMORY_FILE_PATH: /memory/memory.jsonl
    command: >
      --stdio "npx -y @modelcontextprotocol/server-memory"
      --outputTransport streamableHttp
      --stateful
      --port 8000
      --pass-environment
    restart: unless-stopped
